<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <div class="hero-left">
            <div class="logo-area">
                <div class="neu-logo">
                    <span class="logo-icon">📚</span>
                    <span class="logo-text">New Era University</span>
                </div>
                <h1>Library Visitor<br>Management System</h1>
                <p>Track visits • Secure access • Analytics dashboard</p>
            </div>
        </div>
        <div class="form-right">
            <div class="card-panel">
                <h2>Library Kiosk Login</h2>
                <p class="sub">Use your <strong>@neu.edu.ph</strong> Google account</p>
                
                <!-- Google Sign-In Button -->
                <button id="googleSignInBtn" class="btn-google">
                    <svg width="20" height="20" viewBox="0 0 24 24" style="margin-right: 10px;">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Sign in with Google
                </button>
                
                <div id="loginMessage" class="message-area"></div>
                <div class="info-note">
                    <small>📌 Only @neu.edu.ph emails are allowed</small><br>
                    <small>👑 Admins: aqlussalim.sahipa@neu.edu.ph | jcesperanza@neu.edu.ph</small>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const googleSignInBtn = document.getElementById('googleSignInBtn');
        const loginMsg = document.getElementById('loginMessage');
        
        const adminEmails = ['aqlussalim.sahipa@neu.edu.ph', 'jcesperanza@neu.edu.ph'];
        
        googleSignInBtn.addEventListener('click', async () => {
            loginMsg.innerHTML = '<span style="color:#b87c4f;">⏳ Connecting to Google...</span>';
            
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({
                hd: 'neu.edu.ph'
            });
            
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const email = user.email;
                
                if (!email.endsWith('@neu.edu.ph')) {
                    await auth.signOut();
                    loginMsg.innerHTML = '<span style="color:#d9534f;">❌ Only @neu.edu.ph emails are allowed.</span>';
                    return;
                }
                
                const userDocRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userDocRef);
                
                if (!userSnap.exists()) {
                    const role = adminEmails.includes(email) ? 'admin' : 'user';
                    await setDoc(userDocRef, {
                        uid: user.uid,
                        firstName: user.displayName?.split(' ')[0] || '',
                        lastName: user.displayName?.split(' ').slice(1).join(' ') || '',
                        email: email,
                        role: role,
                        isBlocked: false,
                        createdAt: new Date().toISOString(),
                        photoURL: user.photoURL || ''
                    });
                }
                
                const userData = userSnap.exists() ? userSnap.data() : await (await getDoc(userDocRef)).data();
                
                if (userData.isBlocked === true) {
                    await auth.signOut();
                    loginMsg.innerHTML = '<span style="color:#d9534f;">🚫 Your access is blocked. Contact library staff.</span>';
                    return;
                }
                
                if (userData.role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'user-dashboard.html';
                }
                
            } catch (error) {
                console.error(error);
                if (error.code === 'auth/popup-closed-by-user') {
                    loginMsg.innerHTML = '<span style="color:#b87c4f;">Sign-in cancelled.</span>';
                } else {
                    loginMsg.innerHTML = `<span style="color:#d9534f;">❌ Sign-in failed: ${error.message}</span>`;
                }
            }
        });
        
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    if (!userData.isBlocked) {
                        if (userData.role === 'admin') {
                            window.location.href = 'admin-dashboard.html';
                        } else {
                            window.location.href = 'user-dashboard.html';
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
